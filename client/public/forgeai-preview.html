<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kanban Board</title>
  <style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f0f14;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  .container { display: flex; background-color: #0f0f14; padding: 20px; }.sidebar { width: 200px; background-color: #1a1a24; padding: 20px; border-radius: 10px; }.kanban-board { flex: 1; display: flex; justify-content: space-between; }.column { background-color: #1a1a24; padding: 20px; border-radius: 10px; width: 30%; }.progress-bar { background-color: #2a2a34; padding: 10px; border-radius: 10px; }.progress-bar span { background-color: #03a9f4; padding: 10px; border-radius: 10px; }.task-list { list-style: none; padding: 0; margin: 0; }.task-list li { background-color: #2a2a34; padding: 10px; border-radius: 10px; margin-bottom: 10px; }.task-list li span { background-color: #03a9f4; padding: 5px; border-radius: 5px; }.modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); }.modal-content { background-color: #1a1a24; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; }.modal-content h2 { margin-top: 0; }.modal-content form { margin-top: 20px; }.modal-content label { display: block; margin-bottom: 10px; }.modal-content input, .modal-content select { width: 100%; height: 40px; margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; }.modal-content button { width: 100%; height: 40px; background-color: #03a9f4; color: #fff; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
  </style>
  </head>
  <body>
  <!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Kanban Board</title><link rel='stylesheet' href='style.css'></head><body><div class='container'><div class='sidebar'><h2>Team Members</h2><ul id='team-members'></ul></div><div class='kanban-board'><div class='column' id='to-do'><h2>To Do</h2><div class='progress-bar'><span id='to-do-progress'></span></div><ul id='to-do-list' class='task-list'></ul></div><div class='column' id='in-progress'><h2>In Progress</h2><div class='progress-bar'><span id='in-progress-progress'></span></div><ul id='in-progress-list' class='task-list'></ul></div><div class='column' id='done'><h2>Done</h2><div class='progress-bar'><span id='done-progress'></span></div><ul id='done-list' class='task-list'></ul></div></div><button id='add-task-btn'>Add Task</button><div id='task-modal' class='modal'><div class='modal-content'><h2>Add Task</h2><form id='task-form'><label for='title'>Title:</label><input type='text' id='title' name='title'><br><label for='priority'>Priority:</label><select id='priority' name='priority'><option value='High'>High</option><option value='Med'>Med</option><option value='Low'>Low</option></select><br><label for='assignee'>Assignee:</label><select id='assignee' name='assignee'></select><br><label for='due-date'>Due Date:</label><input type='date' id='due-date' name='due-date'><br><button id='submit-task-btn'>Submit</button></form></div></div></div><script src='script.js'></script></body></html>
  <script>
  let tasks = JSON.parse(localStorage.getItem('tasks')) || [{ title: 'Task 1', priority: 'High', assignee: 'John Doe', dueDate: '2024-03-16', column: 'to-do' }, { title: 'Task 2', priority: 'Med', assignee: 'Jane Doe', dueDate: '2024-03-17', column: 'to-do' }, { title: 'Task 3', priority: 'Low', assignee: 'John Doe', dueDate: '2024-03-18', column: 'in-progress' }, { title: 'Task 4', priority: 'High', assignee: 'Jane Doe', dueDate: '2024-03-19', column: 'in-progress' }, { title: 'Task 5', priority: 'Med', assignee: 'John Doe', dueDate: '2024-03-20', column: 'done' }]; let teamMembers = ['John Doe', 'Jane Doe']; document.getElementById('team-members').innerHTML = teamMembers.map(member => `<li><img src='https://via.placeholder.com/40' alt='${member}'> ${member}</li>`).join(''); document.getElementById('assignee').innerHTML = teamMembers.map(member => `<option value='${member}'>${member}</option>`).join(''); tasks.forEach(task => { const taskList = document.getElementById(`${task.column}-list`); const taskHTML = `<li draggable='true' data-title='${task.title}' data-priority='${task.priority}' data-assignee='${task.assignee}' data-due-date='${task.dueDate}'>${task.title} <span>${task.priority}</span> <span>${task.assignee}</span> <span>${task.dueDate}</span></li>`; taskList.insertAdjacentHTML('beforeend', taskHTML); }); document.getElementById('add-task-btn').addEventListener('click', () => { document.getElementById('task-modal').style.display = 'block'; }); document.getElementById('submit-task-btn').addEventListener('click', (e) => { e.preventDefault(); const title = document.getElementById('title').value; const priority = document.getElementById('priority').value; const assignee = document.getElementById('assignee').value; const dueDate = document.getElementById('due-date').value; tasks.push({ title, priority, assignee, dueDate, column: 'to-do' }); localStorage.setItem('tasks', JSON.stringify(tasks)); renderTasks(); document.getElementById('task-modal').style.display = 'none'; document.getElementById('task-form').reset(); }); function renderTasks() { const toDoList = document.getElementById('to-do-list'); const inProgressList = document.getElementById('in-progress-list'); const doneList = document.getElementById('done-list'); toDoList.innerHTML = ''; inProgressList.innerHTML = ''; doneList.innerHTML = ''; tasks.forEach(task => { const taskList = task.column === 'to-do' ? toDoList : task.column === 'in-progress' ? inProgressList : doneList; const taskHTML = `<li draggable='true' data-title='${task.title}' data-priority='${task.priority}' data-assignee='${task.assignee}' data-due-date='${task.dueDate}'>${task.title} <span>${task.priority}</span> <span>${task.assignee}</span> <span>${task.dueDate}</span></li>`; taskList.insertAdjacentHTML('beforeend', taskHTML); }); } document.addEventListener('dragstart', (e) => { if (e.target.tagName === 'LI') { e.dataTransfer.setData('text', e.target.dataset.title); } }); document.addEventListener('dragover', (e) => { e.preventDefault(); }); document.addEventListener('drop', (e) => { e.preventDefault(); if (e.target.classList.contains('task-list')) { const taskTitle = e.dataTransfer.getData('text'); const task = tasks.find(task => task.title === taskTitle); task.column = e.target.id.replace('-list', ''); renderTasks(); localStorage.setItem('tasks', JSON.stringify(tasks)); } });
  </script>
  </body>
  </html>
