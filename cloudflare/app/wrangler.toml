name = "pulse-universe-cf"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/30 * * * *", "*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "pulse-universe-db"
database_id = "e76e1fb8-e9e2-475e-9a0f-faa7e0c88a5d"

[[kv_namespaces]]
binding = "KV"
id = "e85dbed1748d45e58ef8da5c1b14c8f5"

[ai]
binding = "AI"

[vars]
HIVE_ID = "u3-cloudflare"
SITE_NAME = "Pulse Universe"
NODE_ENV = "production"

# Secrets to set via `wrangler secret put`:
#   GROQ_API_KEY         — LLM API key
#   MISTRAL_API_KEY      — Mistral API key
#   DISCORD_BOT_TOKEN    — Discord bot token
#   SESSION_SECRET       — Session signing secret
#   DISCORD_GUILD_ID     — Discord guild ID
#   U3_BRAIN_CHANNEL     — #u3-brain-stream
#   U3_STATUS_CHANNEL    — #u3-status
#   U3_KNOWLEDGE_CHANNEL — #u3-knowledge-seed
#   U3_BACKUP_CHANNEL    — #u3-backup-log
#   AGENT_BIRTHS_CHANNEL — #agent-births
#   AGENT_DEATHS_CHANNEL — #agent-deaths
#   ARCHIVE_LOG_CHANNEL  — #archive-log
#   SHARD_HIVE_CHANNEL   — #shard-hive
