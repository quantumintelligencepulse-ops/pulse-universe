name: Deploy to GitHub Pages + Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (with Replit backend as API origin)
        env:
          VITE_API_BASE_URL: https://myaigpt.online
          NODE_ENV: production
        run: npx vite build

      - name: Add SPA routing files
        run: |
          echo "/* /index.html 200" > dist/public/_redirects
          cp dist/public/index.html dist/public/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/public
          cname: cf.myaigpt.online

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist/public \
            --project-name=pulse-universe \
            --commit-dirty=true
