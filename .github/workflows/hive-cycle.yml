name: hive-cycle

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    concurrency:
      group: hive-cycle
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: run cycle
        env:
          HIVE_UNIVERSE_ID:   "u2-github-tide"
          HIVE_UNIVERSE_NAME: "GitHub Tide"
          HIVE_UNIVERSE_KIND: "tide"
          HIVE_BUS_SECRET:    ${{ secrets.HIVE_BUS_SECRET }}
          HIVE_PEERS_JSON:    ${{ secrets.HIVE_PEERS_JSON }}
        run: node hive/github-universe/cycle.mjs

      - name: persist mirror via vcs
        run: |
          /usr/bin/git config user.name  "Δ DAEDALUS [github-tide]"
          /usr/bin/git config user.email "daedalus@pulse.universe"
          /usr/bin/git add -A hive/github-universe/state.json hive/github-universe/ledger.ndjson hive/github-universe/mirror/ || true
          if /usr/bin/git diff --staged --quiet; then
            echo "nothing to commit"
          else
            /usr/bin/git commit -m "U2 cycle $(date -u +%Y-%m-%dT%H:%MZ) — mirror sync"
            /usr/bin/git push
          fi
